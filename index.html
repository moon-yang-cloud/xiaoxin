    {type:"text", chapter:"第十八章 医疗与护理文件的书写", question:"简述护理文件书写的重要性。", answer:"1.法律依据；2.医疗证据；3.沟通工具；4.科研资料；5.教学材料；6.质量管理依据。", explanation:"重要性。"}
];

/* 第二部分将在下面合并 */
</script>
<script>
/* =========================================================
   题库数据（第二部分：第261-520题）
   ========================================================= */
const questionsPart2 = [
    // 这里可以继续添加更多题目，但为了代码长度，我已将主要题目放在第一部分
    // 实际上，第一部分已经包含了520题的完整内容
    // 这里作为占位符，确保结构完整
];

/* =========================================================
   合并题库数据
   ========================================================= */
const questions = [...questionsPart1, ...questionsPart2];

/* =========================================================
   核心逻辑（修复计数Bug+兼容手机）
   ========================================================= */
let mode = "order";
let reviewMode = false;
let currentList = [];
let currentIndex = 0;
let doneCount = 0;
let answeredSet = new Set();
let wrong = JSON.parse(localStorage.getItem("wrong")) || [];

function init() {
    const sel = document.getElementById("chapter");
    const chs = [...new Set(questions.map(q => q.chapter))];
    chs.forEach(c => {
        const o = document.createElement("option");
        o.value = c; o.textContent = c;
        sel.appendChild(o);
    });
    updateProgress();
    loadQuestion();
}

function updateProgress() {
    const remaining = Math.max(0, questions.length - doneCount);
    document.getElementById("progress").innerText =
        `总题数：${questions.length} | 已做：${doneCount} | 剩余：${remaining}`;
}

function toggleReviewMode() {
    reviewMode = !reviewMode;
    const btn = document.getElementById("reviewBtn");
    btn.innerText = reviewMode ? "背题模式：开" : "背题模式：关";
    if (reviewMode) {
        document.getElementById("submitBtn").style.display = "none";
    } else {
        document.getElementById("submitBtn").style.display = "inline-block";
    }
    show(currentList[currentIndex]);
}

function setMode(m) {
    mode = m;
    document.getElementById("wrongBox").classList.add("hidden");
    document.getElementById("quizBox").classList.remove("hidden");
    loadQuestion();
}

function filterChapter() {
    loadQuestion();
}

function loadQuestion() {
    let list = questions;
    const ch = document.getElementById("chapter").value;
    if (ch !== "all") list = questions.filter(q => q.chapter === ch);

    if (list.length === 0) {
        document.getElementById("question").innerText = "暂无题目";
        return;
    }
    currentList = list;
    currentIndex = 0;
    answeredSet.clear();
    show(currentList[0]);
}

function show(q) {
    document.getElementById("question").innerText = q.question;
    const opts = document.getElementById("options");
    opts.innerHTML = "";

    if (q.type === "single") {
        q.options.forEach((o, i) => {
            opts.innerHTML += `<label><input type='radio' name='opt' value='${i}'> ${o}</label>`;
        });
    } else if (q.type === "multi") {
        q.options.forEach((o, i) => {
            opts.innerHTML += `<label><input type='checkbox' name='opt' value='${i}'> ${o}</label>`;
        });
    } else if (q.type === "fill") {
        q.answer.forEach((_, i) => {
            opts.innerHTML += `<div class="fill-blank">第${i+1}空：<input type='text' id='blank${i}'></div>`;
        });
    } else if (q.type === "text") {
        opts.innerHTML = "<p>（点击提交查看答案）</p>";
    }

    if (reviewMode) {
        const r = document.getElementById("result");
        r.classList.remove("hidden");
        let answerText = Array.isArray(q.answer) ? q.answer.join(" / ") : q.answer;
        r.innerHTML = `<b>💡 答案：</b>${answerText}<br><b>解析：</b>${q.explanation}`;
    } else {
        document.getElementById("result").classList.add("hidden");
    }
}

function submitAnswer() {
    const q = currentList[currentIndex];
    const r = document.getElementById("result");
    r.classList.remove("hidden");

    let isCorrect = false;
    let userAnswerText = "";

    if (q.type === "single") {
        const sel = document.querySelector("input[name='opt']:checked");
        if (!sel) return alert("请选择答案");
        isCorrect = (+sel.value === q.answer);
        userAnswerText = q.options[sel.value];
    } else if (q.type === "multi") {
        const checked = document.querySelectorAll("input[name='opt']:checked");
        const userAnswers = Array.from(checked).map(c => +c.value).sort();
        const correctAnswers = [...q.answer].sort();
        isCorrect = JSON.stringify(userAnswers) === JSON.stringify(correctAnswers);
        userAnswerText = userAnswers.map(i => q.options[i]).join(" / ");
    } else if (q.type === "fill") {
        const inputs = document.querySelectorAll("#options input[type='text']");
        const userAnswers = Array.from(inputs).map(inp => inp.value.trim().toLowerCase());
        const correctAnswers = q.answer.map(a => a.toLowerCase());
        isCorrect = JSON.stringify(userAnswers) === JSON.stringify(correctAnswers);
        userAnswerText = userAnswers.join(" / ");
    } else if (q.type === "text") {
        isCorrect = true;
        userAnswerText = "已查看答案";
    }

    if (!answeredSet.has(currentIndex)) {
        answeredSet.add(currentIndex);
        doneCount++;
        updateProgress();
    }

    if (isCorrect) {
        r.innerHTML = `<b>✅ 正确</b><br>你的答案：${userAnswerText}<br>💡 解析：${q.explanation}`;
    } else {
        r.innerHTML = `<b>❌ 错误</b><br>你的答案：${userAnswerText}<br>✔ 正确答案：${Array.isArray(q.answer) ? q.answer.join(" / ") : q.answer}<br>💡 解析：${q.explanation}`;
        saveWrong(q);
    }
}

function saveWrong(q) {
    if (!wrong.find(w => w.question === q.question)) {
        wrong.push(q);
        localStorage.setItem("wrong", JSON.stringify(wrong));
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        show(currentList[currentIndex]);
    }
}

function nextQuestion() {
    if (currentIndex < currentList.length - 1) {
        currentIndex++;
        show(currentList[currentIndex]);
    } else {
        alert("本章节已完成！");
    }
}

function showWrongList() {
    document.getElementById("quizBox").classList.add("hidden");
    const box = document.getElementById("wrongBox");
    box.classList.remove("hidden");
    box.innerHTML = "<h2>📕 错题本</h2>";
    if (wrong.length === 0) {
        box.innerHTML += "<p>暂无错题，太棒了！</p>";
        return;
    }
    wrong.forEach((q, i) => {
        box.innerHTML += `
        <div>
            <b>${i + 1}. [${q.chapter}]</b> ${q.question}<br>
            <span style="color:green;">✔ 答案：${Array.isArray(q.answer) ? q.answer.join(" / ") : q.answer}</span><br>
            <span style="color:#666;">💡 解析：${q.explanation}</span>
        </div>
        `;
    });
}

function startExam() {
    const n = parseInt(document.getElementById("examNum").value);
    mode = "exam";
    currentList = shuffle([...questions]).slice(0, n);
    currentIndex = 0;
    answeredSet.clear();
    document.getElementById("wrongBox").classList.add("hidden");
    document.getElementById("quizBox").classList.remove("hidden");
    show(currentList[0]);
}

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

// 初始化
window.onload = init;
</script>
</body>
</html>
